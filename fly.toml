# fly.toml app configuration file generated for trading-bot-lingering-lake-4314 on 2026-03-05T15:19:43-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-lingering-lake-4314'
primary_region = 'sjc'

[build]

[env]
  OANDA_ENVIRONMENT = 'practice'
  PAPER_TRADING = 'true'

[[mounts]]
  source = 'trading_data'
  destination = '/app/data'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8501
  auto_stop_machines = 'off'
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
