# fly.toml app configuration file generated for trading-bot-lingering-lake-4314 on 2026-03-05T15:19:43-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-lingering-lake-4314'
primary_region = 'sjc'

[build]

[env]
  OANDA_ENVIRONMENT = 'practice'
  PAPER_TRADING = 'true'

[[mounts]]
  source = 'trading_data'
  destination = '/app/data'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']


[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048
