# fly.toml app configuration file generated for trading-bot-lingering-lake-4314 on 2026-03-05T15:19:43-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-lingering-lake-4314'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

[env]
  OANDA_ENVIRONMENT = 'practice'
  PAPER_TRADING = 'true'
  # Memory tuning for the FinBERT/torch process on a 1-vCPU machine. Caps glibc
  # malloc arenas (each can hoard tens of MB on threaded torch/tokenizers procs),
  # pins torch to 1 thread (matches the single shared vCPU), and disables HF
  # tokenizers parallelism. Goal: shrink bot RSS enough to drop the VM to 1GB.
  MALLOC_ARENA_MAX = '2'
  OMP_NUM_THREADS = '1'
  TOKENIZERS_PARALLELISM = 'false'

[[mounts]]
  source = 'trading_data'
  destination = '/app/data'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']


[[vm]]
  memory = '2048mb'
  cpus = 1
  memory_mb = 2048
